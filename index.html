<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Principal - Oswaldo Miranda</title>
    <style>
        body { 
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f9;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        .logo-placeholder {
            width: 150px;
            height: 150px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: 2px dashed #aaa;
            color: #555;
            font-size: 0.9em;
        }
        .info {
            text-align: right;
        }
        .content {
            text-align: center;
            max-width: 600px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background-color: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2em;
            margin-top: 20px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-placeholder">
        <img src="Logo.png" alt="Logo Santa Fe">
    </div>
    <div class="info">
        <h1>Oswaldo Miranda Carrasco</h1>
        <p>Docente de Matemáticas</p>
    </div>
</header>

<div class="content">
    <h2>Bienvenido a mi sitio de recursos educativos</h2>
    <p>Haz clic en el botón de abajo para acceder a la actividad interactiva:</p>
    <a href="Circunferencia_Unitaria-grafica.html" class="btn">Ir a Circunferencia Unitaria</a>
</div>

</body>
</html>
